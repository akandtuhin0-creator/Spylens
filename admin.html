<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border:  #1e1e1e;
      --accent:  #e8ff4a;
      --text:    #ececec;
      --muted:   #444;
      --danger:  #ff4a4a;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .brand {
      display: flex; align-items: center; gap: 0.75rem;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .brand-name {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-right {
      display: flex; align-items: center; gap: 1.5rem;
    }

    .user-badge {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn:hover { border-color: var(--danger); color: var(--danger); }

    .btn-refresh {
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ───────────────────────────────────────────────── */
    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    /* ── STATS BAR ──────────────────────────────────────────── */
    .stats {
      display: flex; align-items: center; gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      display: flex; flex-direction: column; gap: 0.2rem;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }

    /* ── TOOLBAR ────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap; gap: 1rem;
    }

    .toolbar-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sort-group {
      display: flex; gap: 0.5rem;
    }

    .sort-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sort-btn.active, .sort-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── GRID ───────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .img-card {
      background: var(--surface);
      position: relative;
      aspect-ratio: 16/10;
      overflow: hidden;
      cursor: pointer;
    }

    .img-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: brightness(0.9);
    }

    .img-card:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    .img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex; align-items: flex-end; padding: 0.6rem;
    }

    .img-card:hover .img-overlay { opacity: 1; }

    .img-ts {
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
    }

    .img-num {
      position: absolute; top: 0.5rem; right: 0.5rem;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: rgba(0,0,0,0.5);
      padding: 0.2rem 0.4rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .img-card:hover .img-num { opacity: 1; }

    /* ── LIGHTBOX ───────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.95);
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border: 1px solid var(--border);
    }

    #lightbox .lb-meta {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    #lightbox .lb-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.15em;
      padding: 0.4rem 0.8rem;
      transition: all 0.15s;
    }

    #lightbox .lb-close:hover {
      border-color: var(--danger); color: var(--danger);
    }

    /* ── STATES ─────────────────────────────────────────────── */
    #status {
      text-align: center;
      padding: 5rem 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status.error { color: var(--danger); }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main   { padding: 1.25rem; }
      .brand-name { display: none; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Capture // Admin</span>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userEmail">—</span>
      <button class="btn btn-refresh" id="refreshBtn">↺ Refresh</button>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Total Photos</span>
        <span class="stat-value accent" id="statTotal">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Latest Capture</span>
        <span class="stat-value" id="statLatest" style="font-size:0.75rem;">—</span>
      </div>
    </div>

    <div class="toolbar">
      <span class="toolbar-title">Captured Images</span>
      <div class="sort-group">
        <button class="sort-btn active" id="sortNew">Newest</button>
        <button class="sort-btn" id="sortOld">Oldest</button>
      </div>
    </div>

    <div id="status">
      <div class="spinner"></div><br>Loading images...
    </div>

    <div id="grid"></div>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button class="lb-close" id="lbClose">✕ Close</button>
    <img id="lbImg" src="" alt="" />
    <div class="lb-meta" id="lbMeta"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const SUPABASE_URL     = 'https://iircapwzzcnasurodkwv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcmNhcHd6emNuYXN1cm9ka3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTU5MTIsImV4cCI6MjA5NTMzMTkxMn0.3wVMc8Xqp35yrRCV7Kocg7h_JITCPSqOcUFMs9B0us4';
    const BUCKET           = 'photos';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── AUTH GUARD ───────────────────────────────────────────────────────────
    let currentSession = null;

    async function guardRoute() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return false;
      }
      currentSession = session;
      document.getElementById('userEmail').textContent = session.user.email;
      return true;
    }

    // ─── LOGOUT ───────────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'login.html';
    });

    // ─── STATE ────────────────────────────────────────────────────────────────
    let allFiles  = [];
    let sortOrder = 'newest'; // 'newest' | 'oldest'

    // ─── LOAD IMAGES ─────────────────────────────────────────────────────────
    async function loadImages() {
      const statusEl = document.getElementById('status');
      statusEl.innerHTML = '<div class="spinner"></div><br>Loading images...';
      statusEl.className = '';

      const { data, error } = await sb.storage
        .from(BUCKET)
        .list('', { limit: 1000, sortBy: { column: 'created_at', order: 'desc' } });

      if (error) {
        statusEl.textContent = 'Error loading images: ' + error.message;
        statusEl.className   = 'error';
        return;
      }

      // Filter to images only
      allFiles = (data || []).filter(f => /\.(jpg|jpeg|png|webp)$/i.test(f.name));
      renderGrid();
    }

    // ─── RENDER GRID ─────────────────────────────────────────────────────────
    function renderGrid() {
      const statusEl = document.getElementById('status');
      const grid     = document.getElementById('grid');
      grid.innerHTML = '';

      const files = sortOrder === 'newest'
        ? [...allFiles].sort((a, b) => b.name.localeCompare(a.name))
        : [...allFiles].sort((a, b) => a.name.localeCompare(b.name));

      // Stats
      document.getElementById('statTotal').textContent = files.length;
      if (files.length > 0) {
        const ts = parseInt(files[0].name);
        document.getElementById('statLatest').textContent =
          isNaN(ts) ? files[0].name : new Date(ts).toLocaleString();
      } else {
        document.getElementById('statLatest').textContent = '—';
      }

      if (files.length === 0) {
        statusEl.textContent = 'No images captured yet.';
        statusEl.className   = '';
        return;
      }

      statusEl.style.display = 'none';

      files.forEach((file, i) => {
        const { data } = sb.storage.from(BUCKET).getPublicUrl(file.name);
        const url = data?.publicUrl;

        const ts = parseInt(file.name);
        const label = isNaN(ts)
          ? file.name
          : new Date(ts).toLocaleString();

        const card = document.createElement('div');
        card.className = 'img-card';
        card.innerHTML = `
          <img src="${url}" alt="Capture ${i+1}" loading="lazy" />
          <div class="img-overlay">
            <span class="img-ts">${label}</span>
          </div>
          <span class="img-num">#${files.length - i}</span>
        `;

        card.addEventListener('click', () => openLightbox(url, label));
        grid.appendChild(card);
      });
    }

    // ─── SORT ─────────────────────────────────────────────────────────────────
    document.getElementById('sortNew').addEventListener('click', () => {
      sortOrder = 'newest';
      document.getElementById('sortNew').classList.add('active');
      document.getElementById('sortOld').classList.remove('active');
      renderGrid();
    });

    document.getElementById('sortOld').addEventListener('click', () => {
      sortOrder = 'oldest';
      document.getElementById('sortOld').classList.add('active');
      document.getElementById('sortNew').classList.remove('active');
      renderGrid();
    });

    // ─── REFRESH ─────────────────────────────────────────────────────────────
    document.getElementById('refreshBtn').addEventListener('click', loadImages);

    // ─── LIGHTBOX ─────────────────────────────────────────────────────────────
    function openLightbox(url, meta) {
      document.getElementById('lbImg').src = url;
      document.getElementById('lbMeta').textContent = meta;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lbImg').src = '';
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // ─── BOOT ─────────────────────────────────────────────────────────────────
    (async () => {
      const ok = await guardRoute();
      if (ok) loadImages();
    })();

    // ─── AUTH LISTENER ────────────────────────────────────────────────────────
    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') window.location.href = 'login.html';
    });
  </script>
</body>
</html>
